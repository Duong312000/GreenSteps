<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GreenSteps Travel - Quản lý dịch vụ đối tác.">
    <title>GreenSteps Travel - Dịch vụ của tôi</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Design System CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Header Container (Renders the global menubar) -->
    <div id="app-header"></div>

    <main class="main-viewport">
        <div class="services-container">
            <!-- Left Column: Add Service Form -->
            <div class="service-form-card">
                <h3>Đăng tải dịch vụ mới</h3>
                <form class="form-grid" id="newServiceForm" onsubmit="handleNewService(event)">
                    <div class="form-grid">
                        <label for="srvName">Tên dịch vụ *</label>
                        <input type="text" id="srvName" required placeholder="Ví dụ: Homestay Biển Xanh Phú Yên">
                    </div>
                    <div class="form-grid">
                        <label for="srvDest">Khu vực hoạt động *</label>
                        <select id="srvDest" required>
                            <option value="Phú Yên">Phú Yên</option>
                            <option value="Đà Lạt">Đà Lạt</option>
                            <option value="Đà Nẵng - Hội An">Đà Nẵng - Hội An</option>
                        </select>
                    </div>
                    <div class="form-grid">
                        <label for="srvType">Loại hình dịch vụ *</label>
                        <select id="srvType" required>
                            <option value="stay">Lưu trú (Homestay/Resort)</option>
                            <option value="food">Ăn uống (Nhà hàng/Quán ăn)</option>
                            <option value="explore">Giải trí & Trải nghiệm</option>
                            <option value="transport">Vận chuyển xanh</option>
                        </select>
                    </div>
                    <div class="form-grid">
                        <label for="srvCost">Giá niêm yết (VNĐ) *</label>
                        <input type="number" id="srvCost" required placeholder="Ví dụ: 500000" min="0">
                    </div>
                    <button type="submit" class="form-submit-btn">Đăng dịch vụ</button>
                </form>
            </div>

            <!-- Right Column: Services List -->
            <div class="chart-card" style="padding: 24px;">
                <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 15px;">
                    <h3 style="margin:0;">Danh mục dịch vụ đang kinh doanh</h3>
                    <button class="booking-actions-btn" onclick="exportServicesList()"><i class="bi bi-download"></i> Xuất danh sách</button>
                </div>
                <div class="part-table-wrapper" style="margin-top:0;">
                    <table class="bookings-table" id="myServicesTable">
                        <thead>
                            <tr>
                                <th>Tên dịch vụ</th>
                                <th>Loại hình</th>
                                <th>Khu vực</th>
                                <th>Giá dịch vụ</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Filled dynamically -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer Container -->
    <div id="app-footer"></div>

    <!-- Core Scripts -->
    <script src="js/api.js"></script>
    <script src="js/state.js"></script>
    <script src="js/main.js"></script>

    <!-- Page Scripts -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = window.Session.getCurrentUser();
            if (!user || user.role !== 'provider') {
                alert("Bạn cần đăng nhập với vai trò Đối tác (partner) để quản lý dịch vụ!");
                window.location.href = "auth.html";
                return;
            }

            renderMyServices();
        });

        function renderMyServices() {
            const tbody = document.querySelector('#myServicesTable tbody');
            tbody.innerHTML = '';

            const services = window.API.getMyServices();
            services.forEach(srv => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${srv.name}</strong></td>
                    <td><span class="status-badge" style="background-color: var(--light-mint); color: var(--primary-green);">${getFriendlyType(srv.type)}</span></td>
                    <td>${srv.dest}</td>
                    <td><strong>${srv.cost.toLocaleString('vi-VN')}đ</strong></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function getFriendlyType(type) {
            if (type === 'stay') return '🏨 Lưu trú';
            if (type === 'food') return '🍲 Ăn uống';
            if (type === 'explore') return '🏞️ Trải nghiệm';
            if (type === 'transport') return '🛵 Vận chuyển';
            return 'Dịch vụ';
        }

        function handleNewService(e) {
            e.preventDefault();
            const name = document.getElementById('srvName').value;
            const dest = document.getElementById('srvDest').value;
            const type = document.getElementById('srvType').value;
            const cost = parseInt(document.getElementById('srvCost').value);

            window.API.addMyService({
                name: name,
                dest: dest,
                type: type,
                cost: cost
            });

            renderMyServices();
            document.getElementById('newServiceForm').reset();
            alert("Đã đăng tải dịch vụ lên hệ thống GreenSteps thành công!");
        }

        function exportServicesList() {
            const services = window.API.getMyServices();
            let csv = "Tên dịch vụ,Loại hình,Khu vực,Giá dịch vụ\n";
            services.forEach(srv => {
                csv += `"${srv.name}","${srv.type}","${srv.dest}",${srv.cost}\n`;
            });

            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", "danh_sach_dich_vu.csv");
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>

</html>
