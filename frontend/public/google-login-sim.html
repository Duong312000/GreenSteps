<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Tài khoản Google</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f4f9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #1f1f1f;
        }
        .container {
            background-color: #ffffff;
            border-radius: 28px;
            width: 100%;
            max-width: 400px;
            min-height: 500px;
            padding: 40px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .brand-header {
            text-align: center;
            margin-bottom: 24px;
        }
        .google-logo {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
        }
        .title {
            font-size: 24px;
            font-weight: 400;
            line-height: 1.3;
            color: #1f1f1f;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 14px;
            color: #444746;
            margin-bottom: 16px;
        }
        .subtitle a {
            color: #0b57d0;
            text-decoration: none;
            font-weight: 500;
        }
        .subtitle a:hover {
            text-decoration: underline;
        }
        .account-list {
            display: flex;
            flex-direction: column;
            border-top: 1px solid #e3e3e3;
            margin-bottom: auto;
        }
        .account-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e3e3e3;
            cursor: pointer;
            background: none;
            border-left: none;
            border-right: none;
            width: 100%;
            text-align: left;
            transition: background-color 0.15s ease;
        }
        .account-item:hover {
            background-color: #f7f9fc;
            padding-left: 8px;
            padding-right: 8px;
            margin-left: -8px;
            margin-right: -8px;
            width: calc(100% + 16px);
            border-radius: 8px;
        }
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 13px;
            margin-right: 12px;
            color: #ffffff;
        }
        .avatar-duong { background-color: #0369a1; }
        .avatar-khach { background-color: #15803d; }
        .avatar-custom { background-color: #6b7280; }
        
        .account-info {
            flex-grow: 1;
        }
        .account-name {
            font-size: 14px;
            font-weight: 500;
            color: #1f1f1f;
        }
        .account-email {
            font-size: 12px;
            color: #444746;
        }
        .custom-form {
            display: none;
            flex-direction: column;
            gap: 12px;
            margin-top: 16px;
            animation: fadeIn 0.2s ease-in-out;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .input-group label {
            font-size: 12px;
            font-weight: 500;
            color: #444746;
        }
        .text-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #747775;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
        }
        .text-input:focus {
            border-color: #0b57d0;
            box-shadow: 0 0 0 1px #0b57d0;
        }
        .btn-submit {
            background-color: #0b57d0;
            color: #ffffff;
            border: none;
            padding: 10px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 100px;
            cursor: pointer;
            margin-top: 8px;
            transition: background-color 0.15s ease;
        }
        .btn-submit:hover {
            background-color: #0842a0;
        }
        .btn-cancel {
            background: none;
            border: none;
            color: #0b57d0;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 8px;
            text-align: center;
        }
        .btn-cancel:hover {
            text-decoration: underline;
        }
        .footer {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #444746;
            margin-top: 24px;
        }
        .footer a {
            color: #444746;
            text-decoration: none;
            margin-left: 12px;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div>
            <div class="brand-header">
                <svg class="google-logo" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M23.745 12.27c0-.7-.06-1.4-.19-2.07H12v3.9h6.6c-.28 1.48-1.12 2.73-2.38 3.58v3h3.84c2.25-2.07 3.54-5.12 3.54-8.7c0-.23-.02-.47-.05-.71z"/>
                    <path fill="#34A853" d="M12 24c3.24 0 5.95-1.08 7.93-2.91l-3.84-3c-1.07.72-2.45 1.16-4.09 1.16-3.15 0-5.81-2.13-6.76-5.01H1.28v3.1A12 12 0 0 0 12 24z"/>
                    <path fill="#FBBC05" d="M5.24 14.24a7.15 7.15 0 0 1 0-4.48V6.66H1.28a12 12 0 0 0 0 10.68l3.96-3.1z"/>
                    <path fill="#EA4335" d="M12 4.75c1.77 0 3.35.61 4.6 1.8l3.42-3.42C17.95 1.19 15.24 0 12 0A12 12 0 0 0 1.28 6.66l3.96 3.1c.95-2.88 3.61-5.01 6.76-5.01z"/>
                </svg>
                <h1 class="title">Chọn tài khoản</h1>
                <p class="subtitle">để tiếp tục tới <a href="#">GreenSteps</a></p>
            </div>

            <!-- Choose Account View -->
            <div id="chooseAccountView">
                <div class="account-list" id="accountListContainer">
                    <!-- Loaded dynamically via script below -->
                </div>
            </div>

            <!-- Custom Form View -->
            <div id="customFormView" class="custom-form">
                <div class="input-group">
                    <label for="customEmail">Địa chỉ Gmail</label>
                    <input type="email" id="customEmail" class="text-input" placeholder="example@gmail.com" required>
                </div>
                <div class="input-group" style="margin-top: 8px;">
                    <label for="customName">Họ và tên (tùy chọn)</label>
                    <input type="text" id="customName" class="text-input" placeholder="Nguyễn Văn A">
                </div>
                <button class="btn-submit" onclick="submitCustom()">Tiếp tục</button>
                <button class="btn-cancel" onclick="showChooseAccount()">Quay lại</button>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <span>Tiếng Việt</span>
            <div>
                <a href="#">Trợ giúp</a>
                <a href="#">Quyền riêng tư</a>
                <a href="#">Điều khoản</a>
            </div>
        </div>
    </div>

    <script>
        function loadSavedAccounts() {
            let accounts = [];

            // 1. Check if there is a currently logged-in user in GreenSteps
            try {
                const userStr = localStorage.getItem('greensteps_user');
                if (userStr) {
                    const user = JSON.parse(userStr);
                    if (user && user.email) {
                        accounts.push({
                            email: user.email,
                            name: user.fullname || user.username || 'Người dùng hiện tại',
                            avatarText: (user.fullname || user.username || 'U').substring(0, 2).toUpperCase(),
                            isCurrent: true
                        });
                    }
                }
            } catch (e) {
                console.warn('Failed to parse current user:', e);
            }

            // 2. Check for other Google accounts saved in this browser
            try {
                const savedStr = localStorage.getItem('greensteps_saved_google_accounts');
                if (savedStr) {
                    const savedList = JSON.parse(savedStr);
                    if (Array.isArray(savedList)) {
                        savedList.forEach(acc => {
                            // Avoid duplicate emails
                            if (!accounts.some(a => a.email.toLowerCase() === acc.email.toLowerCase())) {
                                accounts.push({
                                    email: acc.email,
                                    name: acc.name,
                                    avatarText: (acc.name || 'G').substring(0, 2).toUpperCase(),
                                    isCurrent: false
                                });
                            }
                        });
                    }
                }
            } catch (e) {
                console.warn('Failed to parse saved accounts:', e);
            }

            // 3. Fallbacks / Defaults (Dương Nguyễn and Khách Du Lịch)
            const defaultAccounts = [
                { email: 'duong.partner@gmail.com', name: 'Dương Nguyễn', avatarText: 'DN', isCurrent: false },
                { email: 'khach.dulich@gmail.com', name: 'Khách Du Lịch', avatarText: 'KL', isCurrent: false }
            ];

            defaultAccounts.forEach(acc => {
                if (!accounts.some(a => a.email.toLowerCase() === acc.email.toLowerCase())) {
                    accounts.push(acc);
                }
            });

            return accounts;
        }

        function renderAccounts() {
            const accounts = loadSavedAccounts();
            const container = document.getElementById('accountListContainer');
            container.innerHTML = ''; // Clear

            accounts.forEach(acc => {
                const btn = document.createElement('button');
                btn.className = 'account-item';
                btn.onclick = () => selectAccount(acc.email, acc.name);

                let avatarClass = 'avatar';
                if (acc.email === 'duong.partner@gmail.com') avatarClass += ' avatar-duong';
                else if (acc.email === 'khach.dulich@gmail.com') avatarClass += ' avatar-khach';
                else avatarClass += ' avatar-custom';

                btn.innerHTML = `
                    <div class="${avatarClass}">${acc.avatarText}</div>
                    <div class="account-info">
                        <div class="account-name">${acc.name} ${acc.isCurrent ? '<span style="font-size: 10px; color: #0b57d0; font-weight: normal; margin-left: 4px;">(Đang đăng nhập)</span>' : ''}</div>
                        <div class="account-email">${acc.email}</div>
                    </div>
                `;
                container.appendChild(btn);
            });

            // Add custom account button
            const customBtn = document.createElement('button');
            customBtn.className = 'account-item';
            customBtn.onclick = showCustomForm;
            customBtn.innerHTML = `
                <div class="avatar avatar-custom">
                    <svg style="width: 18px; height: 18px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
                    </svg>
                </div>
                <div class="account-info">
                    <div class="account-name" style="color: #0b57d0; font-weight: 500;">Sử dụng một tài khoản khác</div>
                </div>
            `;
            container.appendChild(customBtn);
        }

        function selectAccount(email, name) {
            if (window.opener) {
                window.opener.postMessage({
                    type: 'GOOGLE_LOGIN_SUCCESS',
                    email: email,
                    name: name
                }, window.location.origin);
            }
            window.close();
        }

        function showCustomForm() {
            document.getElementById('chooseAccountView').style.display = 'none';
            document.getElementById('customFormView').style.display = 'flex';
        }

        function showChooseAccount() {
            document.getElementById('chooseAccountView').style.display = 'block';
            document.getElementById('customFormView').style.display = 'none';
        }

        function submitCustom() {
            const email = document.getElementById('customEmail').value.trim();
            const name = document.getElementById('customName').value.trim() || email.split('@')[0];
            if (!email) {
                alert('Vui lòng nhập địa chỉ email.');
                return;
            }
            if (!email.includes('@')) {
                alert('Địa chỉ email không hợp lệ.');
                return;
            }

            // Save to localStorage
            try {
                let savedList = [];
                const savedStr = localStorage.getItem('greensteps_saved_google_accounts');
                if (savedStr) {
                    savedList = JSON.parse(savedStr);
                }
                if (!Array.isArray(savedList)) savedList = [];
                
                const existingIdx = savedList.findIndex(a => a.email.toLowerCase() === email.toLowerCase());
                if (existingIdx >= 0) {
                    savedList[existingIdx].name = name;
                } else {
                    savedList.push({ email: email, name: name });
                }
                localStorage.setItem('greensteps_saved_google_accounts', JSON.stringify(savedList));
            } catch (e) {
                console.warn('Failed to save custom account:', e);
            }

            selectAccount(email, name);
        }

        // Initialize dynamic list on load
        window.onload = renderAccounts;
    </script>
</body>
</html>
