<header class="fixed inset-x-0 top-0 z-50 h-[88px] px-5 pt-0 text-[#184A37] md:px-10 lg:px-12">
    <div class="mx-auto flex h-[88px] max-w-[1720px] items-center justify-between">
        <div class="w-[212px] md:w-[300px]" aria-hidden="true"></div>

        <nav class="hidden flex-1 items-center justify-center gap-12 text-[18px] font-semibold leading-none lg:flex">
            <a routerLink="/tours" class="relative transition-colors duration-300 after:absolute after:-bottom-2 after:left-0 after:h-0.5 after:w-0 after:bg-[#0E9F6E] after:transition-all after:duration-300 hover:text-[#0E9F6E] hover:after:w-full">Destinations</a>
            <a routerLink="/tours" class="relative transition-colors duration-300 after:absolute after:-bottom-2 after:left-0 after:h-0.5 after:w-0 after:bg-[#0E9F6E] after:transition-all after:duration-300 hover:text-[#0E9F6E] hover:after:w-full">Flights</a>
            <a routerLink="/partner-services" class="relative transition-colors duration-300 after:absolute after:-bottom-2 after:left-0 after:h-0.5 after:w-0 after:bg-[#0E9F6E] after:transition-all after:duration-300 hover:text-[#0E9F6E] hover:after:w-full">Hotels</a>
            <a routerLink="/tours" class="relative transition-colors duration-300 after:absolute after:-bottom-2 after:left-0 after:h-0.5 after:w-0 after:bg-[#0E9F6E] after:transition-all after:duration-300 hover:text-[#0E9F6E] hover:after:w-full">Tours</a>
            <a routerLink="/community" class="relative transition-colors duration-300 after:absolute after:-bottom-2 after:left-0 after:h-0.5 after:w-0 after:bg-[#0E9F6E] after:transition-all after:duration-300 hover:text-[#0E9F6E] hover:after:w-full">Deals</a>
            <a routerLink="/schedule/new" class="relative transition-colors duration-300 after:absolute after:-bottom-2 after:left-0 after:h-0.5 after:w-0 after:bg-[#0E9F6E] after:transition-all after:duration-300 hover:text-[#0E9F6E] hover:after:w-full">AI Planner</a>
        </nav>

        <div class="flex w-auto items-center justify-end gap-3 md:w-[300px] md:gap-6">
            <button type="button" class="hidden h-14 w-14 place-items-center rounded-full bg-white/54 text-xl text-[#0F3F31] shadow-[0_8px_20px_rgba(15,53,36,0.08)] transition-all duration-300 hover:-translate-y-0.5 hover:bg-white/78 md:grid" aria-label="Language selector">
                <i class="bi bi-globe2"></i>
            </button>

            <a *ngIf="!currentUser" routerLink="/auth" class="hidden h-[52px] items-center rounded-[16px] bg-[#0E9F6E] px-8 text-[18px] font-bold text-white shadow-[0_12px_28px_rgba(15,53,36,0.18)] transition-all duration-300 hover:-translate-y-0.5 hover:bg-[#0F6B4C] sm:inline-flex">
                Sign in
            </a>

            <a *ngIf="currentUser" routerLink="/profile" class="hidden h-14 items-center gap-2 rounded-full bg-white/54 px-3 pr-5 text-sm font-bold text-[#0F3F31] sm:flex">
                <span class="grid h-9 w-9 place-items-center rounded-full bg-[#0E7A59] text-xs text-white">{{ getFirstLetter(currentUser.fullname) }}</span>
                <span class="max-w-28 truncate">{{ currentUser.fullname }}</span>
            </a>

            <button type="button" class="grid h-14 w-14 place-items-center rounded-full bg-white/54 text-2xl text-[#0F3F31] shadow-[0_8px_20px_rgba(15,53,36,0.08)] transition-all duration-300 hover:-translate-y-0.5 hover:bg-white/78" aria-label="Open menu">
                <i class="bi bi-list"></i>
            </button>
        </div>
    </div>
</header>
