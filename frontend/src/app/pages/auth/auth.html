<main class="main-viewport auth-page-container">
    <div class="auth-card">
        <!-- Tab Headers -->
        <div class="auth-tabs-header">
            <button class="auth-tab-btn" [class.active]="activeTab === 'login'" (click)="switchTab('login')">Đăng nhập</button>
            <button class="auth-tab-btn" [class.active]="activeTab === 'register'" (click)="switchTab('register')">Đăng ký mới</button>
        </div>

        <!-- LOGIN FORM -->
        <form class="auth-form" [class.active]="activeTab === 'login'" (submit)="onLoginSubmit($event)">
            <button type="button" class="btn-google-auth" (click)="alertGoogle()"><i class="bi bi-chrome"></i> Đăng nhập bằng Google</button>
            <div class="auth-separator"><span>HOẶC</span></div>

            <div class="form-group">
                <label for="loginUser">Tên đăng nhập (hoặc email)</label>
                <input type="text" id="loginUser" [(ngModel)]="loginUsername" name="loginUsername" placeholder="Ví dụ: traveler hoặc partner" required>
            </div>
            <div class="form-group">
                <label for="loginPassword">Mật khẩu</label>
                <input type="password" id="loginPassword" [(ngModel)]="loginPassword" name="loginPassword" placeholder="Nhập mật khẩu của bạn" required>
            </div>

            <div class="auth-actions-row">
                <label class="checkbox-label">
                    <input type="checkbox" checked> Duy trì đăng nhập
                </label>
                <a href="#" class="forgot-pwd-link" (click)="$event.preventDefault(); alertForgotPassword()">Quên mật khẩu?</a>
            </div>

            <button type="submit" class="btn-auth-submit">Đăng nhập</button>
        </form>

        <!-- REGISTER FORM -->
        <form class="auth-form" [class.active]="activeTab === 'register'" (submit)="onRegisterSubmit($event)">
            <button type="button" class="btn-google-auth" (click)="alertGoogle()"><i class="bi bi-chrome"></i> Đăng ký bằng Google</button>
            <div class="auth-separator"><span>HOẶC</span></div>

            <div class="form-group">
                <label for="regName">Họ và tên</label>
                <input type="text" id="regName" [(ngModel)]="regFullname" name="regFullname" placeholder="Nhập họ và tên của bạn" required>
            </div>
            <div class="form-group">
                <label for="regEmail">Email</label>
                <input type="email" id="regEmail" [(ngModel)]="regEmail" name="regEmail" placeholder="Nhập địa chỉ email" required>
            </div>
            <div class="form-group">
                <label for="regPhone">Số điện thoại</label>
                <input type="tel" id="regPhone" [(ngModel)]="regPhone" name="regPhone" placeholder="Nhập số điện thoại" required>
            </div>
            <div class="form-group">
                <label for="regPassword">Mật khẩu</label>
                <input type="password" id="regPassword" [(ngModel)]="regPassword" name="regPassword" placeholder="Tạo mật khẩu mới" required>
            </div>

            <label class="checkbox-label agreement-row">
                <input type="checkbox" [(ngModel)]="agreeTerms" name="agreeTerms" required> Tôi đồng ý với các điều khoản & Chính sách của GreenSteps
            </label>

            <button type="submit" class="btn-auth-submit">Tạo tài khoản</button>
        </form>
    </div>
</main>
