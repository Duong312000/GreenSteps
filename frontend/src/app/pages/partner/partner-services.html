<main class="main-viewport partner-viewport">
    <div class="services-container" style="display: grid; grid-template-columns: 2fr 3fr; gap: 30px; padding: 40px; width: 100%; max-width: 1200px; margin: 0 auto;">
        <!-- Left Column: Add Service Form -->
        <div class="service-form-card" style="background-color: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--border-radius-md); padding: 24px; box-shadow: var(--shadow-sm); display: flex; flex-direction: column; gap: 20px; height: fit-content;">
            <h3 style="font-size: 18px; font-weight: 700; color: var(--text-primary); border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin: 0;">Đăng tải dịch vụ mới</h3>
            <form (submit)="submitNewService($event)" style="display: flex; flex-direction: column; gap: 15px;">
                <div style="display: flex; flex-direction: column; gap: 6px;">
                    <label for="srvName" style="font-size: 13px; font-weight: 600; color: var(--text-secondary);">Tên dịch vụ *</label>
                    <input type="text" id="srvName" [(ngModel)]="serviceName" name="serviceName" required placeholder="Ví dụ: Homestay Biển Xanh Phú Yên" style="height: 38px; border-radius: var(--border-radius-sm); border: 1px solid var(--border-color); padding: 0 12px; font-size: 13px; background-color: var(--bg-primary); color: var(--text-primary);">
                </div>
                <div style="display: flex; flex-direction: column; gap: 6px;">
                    <label for="srvDest" style="font-size: 13px; font-weight: 600; color: var(--text-secondary);">Khu vực hoạt động *</label>
                    <select id="srvDest" [(ngModel)]="serviceDest" name="serviceDest" required style="height: 38px; border-radius: var(--border-radius-sm); border: 1px solid var(--border-color); padding: 0 12px; font-size: 13px; background-color: var(--bg-primary); color: var(--text-primary);">
                        <option value="Phú Yên">Phú Yên</option>
                        <option value="Đà Lạt">Đà Lạt</option>
                        <option value="Đà Nẵng - Hội An">Đà Nẵng - Hội An</option>
                    </select>
                </div>
                <div style="display: flex; flex-direction: column; gap: 6px;">
                    <label for="srvType" style="font-size: 13px; font-weight: 600; color: var(--text-secondary);">Loại hình dịch vụ *</label>
                    <select id="srvType" [(ngModel)]="serviceType" name="serviceType" required style="height: 38px; border-radius: var(--border-radius-sm); border: 1px solid var(--border-color); padding: 0 12px; font-size: 13px; background-color: var(--bg-primary); color: var(--text-primary);">
                        <option value="stay">Lưu trú (Homestay/Resort)</option>
                        <option value="food">Ăn uống (Nhà hàng/Quán ăn)</option>
                        <option value="tour">Giải trí & Trải nghiệm</option>
                        <option value="transport">Vận chuyển xanh</option>
                    </select>
                </div>
                <div style="display: flex; flex-direction: column; gap: 6px;">
                    <label for="srvCost" style="font-size: 13px; font-weight: 600; color: var(--text-secondary);">Giá niêm yết (VNĐ) *</label>
                    <input type="number" id="srvCost" [(ngModel)]="serviceCost" name="serviceCost" required placeholder="Ví dụ: 500000" min="0" style="height: 38px; border-radius: var(--border-radius-sm); border: 1px solid var(--border-color); padding: 0 12px; font-size: 13px; background-color: var(--bg-primary); color: var(--text-primary);">
                </div>
                <div style="display: flex; flex-direction: column; gap: 6px;">
                    <label for="srvCarbon" style="font-size: 13px; font-weight: 600; color: var(--text-secondary);">Mức phát thải (kg CO₂) *</label>
                    <input type="number" id="srvCarbon" [(ngModel)]="serviceCarbon" name="serviceCarbon" required placeholder="Ví dụ: 1.5" min="0" step="0.1" style="height: 38px; border-radius: var(--border-radius-sm); border: 1px solid var(--border-color); padding: 0 12px; font-size: 13px; background-color: var(--bg-primary); color: var(--text-primary);">
                </div>
                <button type="submit" style="height: 40px; margin-top: 10px; background-color: var(--primary); color: white; border: none; border-radius: var(--border-radius-sm); font-weight: 700; cursor: pointer; font-size: 14px; transition: var(--transition-smooth);">Đăng dịch vụ</button>
            </form>
        </div>

        <!-- Right Column: Services List -->
        <div class="chart-card" style="background-color: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--border-radius-md); padding: 24px; box-shadow: var(--shadow-sm); display: flex; flex-direction: column; gap: 20px; height: fit-content;">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; margin: 0;">
                <h3 style="font-size: 18px; font-weight: 700; color: var(--text-primary); margin: 0;">Danh mục dịch vụ đang kinh doanh</h3>
                <button (click)="exportServicesList()" style="background-color: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--border-radius-sm); color: var(--text-secondary); font-weight: 700; padding: 8px 16px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 12px; transition: var(--transition-smooth);">
                    <i class="bi bi-download"></i> Xuất danh sách
                </button>
            </div>
            <div class="part-table-wrapper" style="overflow-x: auto; margin-top: 5px;">
                <table style="width: 100%; border-collapse: collapse; text-align: left; font-size: 13px;">
                    <thead>
                        <tr style="border-bottom: 2px solid var(--border-color); color: var(--text-muted); font-weight: 700;">
                            <th style="padding: 12px 10px;">Tên dịch vụ</th>
                            <th style="padding: 12px 10px;">Loại hình</th>
                            <th style="padding: 12px 10px;">Khu vực</th>
                            <th style="padding: 12px 10px;">Giá dịch vụ</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngIf="myServices.length === 0">
                            <td colspan="4" style="text-align: center; padding: 40px; color: var(--text-muted);">Bạn chưa có dịch vụ nào trên hệ thống.</td>
                        </tr>
                        <tr *ngFor="let srv of myServices" style="border-bottom: 1px solid var(--border-color); color: var(--text-primary); transition: var(--transition-smooth);">
                            <td style="padding: 14px 10px;"><strong>{{ srv.name }}</strong></td>
                            <td style="padding: 14px 10px;">
                                <span style="background-color: var(--light-mint); color: var(--primary-green); font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 4px; display: inline-block;">
                                    {{ getActivityTypeLabel(srv.type) }}
                                </span>
                            </td>
                            <td style="padding: 14px 10px;">{{ srv.destination }}</td>
                            <td style="padding: 14px 10px; font-weight: 700; color: var(--primary);">{{ srv.cost | number:'1.0-0':'vi-VN' }}đ</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
