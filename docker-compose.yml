services:
  postgres:
    image: postgres:16-alpine
    container_name: greensteps-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: greensteps
    ports:
      - "5432:5432"
    volumes:
      - greensteps-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d greensteps"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  greensteps-postgres-data:

