<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Đăng nhập hoặc đăng ký tài khoản GreenSteps Travel.">
    <title>GreenSteps Travel - Đăng nhập / Đăng ký</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Geist:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Design System CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Header Container -->
    <div id="app-header"></div>

    <main class="main-viewport auth-viewport">
        <div class="auth-box-container">
            <div class="auth-logo-row">
                <div class="logo-leaf-icon"><i class="bi bi-leaf-fill"></i></div>
                <h2>GREENSTEPS</h2>
            </div>

            <!-- Tab Toggles -->
            <div class="auth-tabs-header">
                <button class="auth-tab active" id="tabLoginBtn" onclick="switchAuthTab('login')">Đăng nhập</button>
                <button class="auth-tab" id="tabRegisterBtn" onclick="switchAuthTab('register')">Đăng ký</button>
            </div>

            <!-- LOGIN FORM (Slide Page 9) -->
            <form class="auth-form active" id="loginForm" onsubmit="handleLoginSubmit(event)">
                <button type="button" class="btn-google-auth"><i class="bi bi-chrome"></i> Đăng nhập bằng Google</button>
                <div class="auth-separator"><span>HOẶC</span></div>

                <div class="form-group">
                    <label for="loginUsername">Tài khoản demo (traveler / partner)</label>
                    <input type="text" id="loginUsername" placeholder="Nhập 'traveler' hoặc 'partner'" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Mật khẩu (123456)</label>
                    <input type="password" id="loginPassword" placeholder="Nhập '123456'" required>
                </div>

                <div class="auth-actions-row">
                    <label class="checkbox-label">
                        <input type="checkbox" checked> Duy trì đăng nhập
                    </label>
                    <a href="#" class="forgot-pwd-link" onclick="alert('Demo: Vui lòng sử dụng mật khẩu 123456')">Quên mật khẩu?</a>
                </div>

                <button type="submit" class="btn-auth-submit">Đăng nhập</button>
                
                <p class="auth-footer-hint">Tài khoản du khách: <strong>traveler / 123456</strong></p>
                <p class="auth-footer-hint">Tài khoản đối tác: <strong>partner / 123456</strong></p>
            </form>

            <!-- REGISTER FORM (Slide Page 8) -->
            <form class="auth-form" id="registerForm" onsubmit="handleRegisterSubmit(event)">
                <button type="button" class="btn-google-auth"><i class="bi bi-chrome"></i> Đăng ký bằng Google</button>
                <div class="auth-separator"><span>HOẶC</span></div>

                <div class="form-group">
                    <label for="regName">Họ và tên</label>
                    <input type="text" id="regName" placeholder="Nhập họ và tên của bạn" required>
                </div>
                <div class="form-group">
                    <label for="regEmail">Email</label>
                    <input type="email" id="regEmail" placeholder="Nhập địa chỉ email" required>
                </div>
                <div class="form-group">
                    <label for="regPhone">Số điện thoại</label>
                    <input type="tel" id="regPhone" placeholder="Nhập số điện thoại" required>
                </div>
                <div class="form-group">
                    <label for="regPassword">Mật khẩu</label>
                    <input type="password" id="regPassword" placeholder="Tạo mật khẩu mới" required>
                </div>

                <label class="checkbox-label agreement-row">
                    <input type="checkbox" required> Tôi đồng ý với các điều khoản & Chính sách của GreenSteps
                </label>

                <button type="submit" class="btn-auth-submit">Tạo tài khoản</button>
            </form>
        </div>
    </main>

    <!-- Footer Container -->
    <div id="app-footer"></div>

    <!-- Core Scripts -->
    <script src="js/api.js"></script>
    <script src="js/state.js"></script>
    <script src="js/main.js"></script>

    <!-- Auth Page Interactions -->
    <script>
        function switchAuthTab(tab) {
            const loginBtn = document.getElementById('tabLoginBtn');
            const regBtn = document.getElementById('tabRegisterBtn');
            const loginForm = document.getElementById('loginForm');
            const regForm = document.getElementById('registerForm');

            if (tab === 'login') {
                loginBtn.classList.add('active');
                regBtn.classList.remove('active');
                loginForm.classList.add('active');
                regForm.classList.remove('active');
            } else {
                regBtn.classList.add('active');
                loginBtn.classList.remove('active');
                regForm.classList.add('active');
                loginForm.classList.remove('active');
            }
        }

        function handleLoginSubmit(e) {
            e.preventDefault();
            const user = document.getElementById('loginUsername').value.trim();
            const pass = document.getElementById('loginPassword').value.trim();

            const res = window.Session.login(user, pass);
            if (res.success) {
                alert(`Đăng nhập thành công với tài khoản ${res.user.fullname}!`);
                if (res.user.role === 'provider') {
                    window.location.href = 'partner_dashboard.html';
                } else {
                    window.location.href = 'index.html';
                }
            } else {
                alert(res.message);
            }
        }

        function handleRegisterSubmit(e) {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const phone = document.getElementById('regPhone').value;

            // Generate traveler account
            const user = {
                username: email.split('@')[0],
                fullname: name,
                email: email,
                phone: phone,
                dob: '01/01/1990',
                gender: 'Nam',
                address: 'Hà Nội, Việt Nam',
                role: 'traveler'
            };
            window.Session.setCurrentUser(user);
            alert("Đăng ký tài khoản thành công! Chào mừng bạn đến với GreenSteps.");
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
