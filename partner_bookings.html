<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GreenSteps Travel - Đơn hàng của tôi.">
    <title>GreenSteps Travel - Đơn hàng của tôi</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Design System CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Header Container (Renders the global menubar) -->
    <div id="app-header"></div>

    <main class="main-viewport">
        <div class="bookings-container">
            <div class="user-title-row" style="margin-bottom: 10px; border-bottom: none;">
                <div>
                    <h2 style="font-size: 26px; color: var(--primary-green);">Danh sách đơn đặt dịch vụ từ khách hàng</h2>
                    <p style="font-size: 13px; color: var(--text-muted);">Phê duyệt các yêu cầu thanh toán gộp và đặt cọc dịch vụ từ du khách.</p>
                </div>
            </div>

            <div class="bookings-table-card">
                <table class="bookings-table" id="partnerBookingsTable">
                    <thead>
                        <tr>
                            <th>Mã đơn</th>
                            <th>Khách hàng</th>
                            <th>Dịch vụ</th>
                            <th>Giá trị cọc</th>
                            <th>Trạng thái</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Populated dynamically -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Footer Container -->
    <div id="app-footer"></div>

    <!-- Core Scripts -->
    <script src="js/api.js"></script>
    <script src="js/state.js"></script>
    <script src="js/main.js"></script>

    <!-- Page Scripts -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = window.Session.getCurrentUser();
            if (!user || user.role !== 'provider') {
                alert("Bạn cần đăng nhập với vai trò Đối tác (partner) để xem trang đơn hàng này!");
                window.location.href = "auth.html";
                return;
            }

            renderPartnerBookings();
        });

        function renderPartnerBookings() {
            const tbody = document.querySelector('#partnerBookingsTable tbody');
            tbody.innerHTML = '';

            const bookings = window.API.getBookings();
            bookings.forEach(bk => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>#${bk.id}</strong></td>
                    <td>${bk.customer}</td>
                    <td>${bk.service}</td>
                    <td><strong>${bk.value.toLocaleString('vi-VN')}đ</strong></td>
                    <td><span class="status-badge ${bk.status}">${getFriendlyStatus(bk.status)}</span></td>
                    <td>
                        ${bk.status === 'pending' ? `<button class="booking-actions-btn" onclick="approveBooking('${bk.id}')">Duyệt cọc</button>` : 'N/A'}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function getFriendlyStatus(status) {
            if (status === 'pending') return 'Chờ duyệt';
            if (status === 'deposit' || status === 'approved') return 'Đã đặt cọc';
            if (status === 'completed') return 'Đã hoàn thành';
            if (status === 'rejected') return 'Đã hủy';
            return status;
        }

        function approveBooking(id) {
            window.API.approveBooking(id);
            // Sync status locally for visual response
            let bookings = window.API.getBookings();
            let bk = bookings.find(b => b.id === id);
            if (bk) {
                bk.status = 'deposit'; // Update status locally to match design
            }
            renderPartnerBookings();
            alert(`Đã duyệt đặt cọc thành công cho đơn #${id}! Doanh thu tạm tính đã cập nhật vào dòng tiền.`);
        }
    </script>
</body>

</html>
